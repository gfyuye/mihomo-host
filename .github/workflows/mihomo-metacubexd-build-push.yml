name: Build and Push Mihomo-Metacubexd Images to GHCR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mihomo-metacubexd

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Get Metacubexd download URL
        id: metacubexd
        run: |
          echo "Fetching Metacubexd latest release info..."
          # 使用 GITHUB_TOKEN 认证，并添加重试
          RELEASE_DATA=$(curl -s --retry 3 --retry-delay 5 \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest)
            DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith("compressed-dist.tgz")) | .browser_download_url' | head -n 1)
    
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: Could not find compressed-dist.tgz asset for Metacubexd"
            echo "Available assets:"
            echo "$RELEASE_DATA" | jq -r '.assets[].name'
            exit 1
          fi
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Metacubexd download URL: $DOWNLOAD_URL"

      # 构建并推送多架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            DASHBOARD_DOWNLOAD_URL=${{ steps.metacubexd.outputs.url }}
