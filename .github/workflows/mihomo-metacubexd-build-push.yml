name: Build and Push Mihomo-Metacubexd Images to GHCR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mihomo-metacubexd

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

# 获取 Zashboard 下载 URL（精确匹配 dist.zip）
      - name: Get Zashboard download URL
        id: zashboard
        run: |
          echo "Fetching Zashboard latest release info..."
          # 获取最新 release 的 JSON 数据
          RELEASE_DATA=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest)
          
          # 精确查找文件名以 dist.zip 结尾的资产，并获取其下载链接
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith("compressed-dist.tgz")) | .browser_download_url' | head -n 1)
          
          # 检查是否找到
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: Could not find dist.zip asset for Zashboard"
            echo "Available assets:"
            echo "$RELEASE_DATA" | jq -r '.assets[].name'
            exit 1
          fi
          
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Zashboard download URL: $DOWNLOAD_URL"

      # 构建并推送多架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            ZASHBOARD_DOWNLOAD_URL=${{ steps.zashboard.outputs.url }}
