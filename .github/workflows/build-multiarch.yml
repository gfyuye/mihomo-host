name: Build and Push Multi-arch Image

on:
  schedule:
    # 每天凌晨2点检查更新
    - cron: '0 2 * * *'
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-multiarch.yml'
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/clash-meta-zashboard

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check latest metacubex version
        id: check
        run: |
          # 获取 metacubex 最新版本
          LATEST_VERSION=$(curl -s https://api.github.com/repos/metacubex/mihomo/releases/latest | grep -o '"tag_name": "v[^"]*"' | cut -d'"' -f4)
          echo "Latest version: $LATEST_VERSION"
          
          # 检查是否已构建过此版本
          if [ -z "$LATEST_VERSION" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.check-upstream.outputs.new_version }}
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push for ${{ matrix.platform }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

  merge-manifest:
    needs: [check-upstream, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          # 创建 manifest
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.new_version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:linux-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:linux-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:linux-arm-v7
          
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:linux-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:linux-arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:linux-arm-v7
          
          # 推送 manifest
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check-upstream.outputs.new_version }}
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  notify:
    needs: [check-upstream, merge-manifest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        if: ${{ needs.check-upstream.outputs.should_build == 'true' }}
        run: |
          echo "✅ Build completed for version ${{ needs.check-upstream.outputs.new_version }}"
          echo "🎉 Image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
