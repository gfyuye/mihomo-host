name: Build and Push Multi-arch Docker Images to GHCR

on:
  push:
    branches: [ "main", "master" ] # 可以根据你的默认分支调整
  # 允许手动触发工作流
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 将 <YOUR_USERNAME> 替换为你的 GitHub 用户名或组织名（小写）
  IMAGE_NAME: ${{ github.repository_owner }}/mihomo-zashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 设置所需权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 QEMU 以支持多架构构建（如 arm64）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx，这是构建多架构镜像的关键
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GHCR (GitHub Container Registry)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 步骤1: 获取最新的 Mihomo 下载 URL
      - name: Get latest Mihomo download URL
        id: mihomo
        run: |
          echo "Fetching Mihomo latest release info..."
          # 获取最新 release 的 JSON 数据，提取包含 "pkg.tar.zst" 的浏览器下载链接
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
          | jq -r '.assets[] | select(.name | endswith("pkg.tar.zst")) | .browser_download_url' \
          | head -n 1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: Could not find pkg.tar.zst asset for Mihomo"
            exit 1
          fi
          echo "Mihomo download URL: $DOWNLOAD_URL"
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      # 步骤2: 获取最新的 Zashboard 下载 URL (通常是一个压缩包)
      - name: Get latest Zashboard download URL
        id: zashboard
        run: |
          echo "Fetching Zashboard latest release info..."
          # 获取最新 release 的 JSON 数据，提取第一个资产的下载链接 (可根据实际情况调整)
          # 如果资产名称有特定模式，也可以像上面一样使用 select
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/Zephyruso/zashboard/releases/latest \
          | jq -r '.assets[0].browser_download_url')
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: Could not find any asset for Zashboard"
            exit 1
          fi
          echo "Zashboard download URL: $DOWNLOAD_URL"
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      # 步骤3: 构建并推送 Docker 镜像
      # 这里我们假设有一个 Dockerfile 存在，并且它接收构建参数
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 指定要构建的平台
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # 将上一步获取的 URL 作为构建参数传递给 Dockerfile
          build-args: |
            MIHOMO_DOWNLOAD_URL=${{ steps.mihomo.outputs.url }}
            ZASHBOARD_DOWNLOAD_URL=${{ steps.zashboard.outputs.url }}
