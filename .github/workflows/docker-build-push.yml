name: Build and Push Multi-arch Docker Images to GHCR

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mihomo-zashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 获取 Mihomo 最新版本信息并保存到文件
      - name: Fetch Mihomo release data
        run: |
          echo "Fetching Mihomo latest release info..."
          curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest > mihomo-release.json
          echo "Mihomo release data saved to file"

      # 获取 Zashboard 下载 URL
      - name: Get Zashboard download URL
        id: zashboard
        run: |
          echo "Fetching Zashboard latest release info..."
          RELEASE_DATA=$(curl -s https://api.github.com/repos/Zephyruso/zashboard/releases/latest)
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[0].browser_download_url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: Could not find any asset for Zashboard"
            exit 1
          fi
          
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Zashboard download URL: $DOWNLOAD_URL"

      # 构建并推送多架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            ZASHBOARD_DOWNLOAD_URL=${{ steps.zashboard.outputs.url }}
          # 通过文件传递 Mihomo 数据
          secrets: |
            "MIHOMO_RELEASE_DATA=./mihomo-release.json"
